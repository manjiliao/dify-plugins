description:
  human:
    en_US: Convert one or more worksheets in an Excel file to PNG or JPG images
    zh_Hans: 将 Excel 文件中的一个或多个工作表转换为 PNG 或 JPG 图片
  llm: Convert an Excel file into worksheet images. You can export all sheets or selected sheets by name or 1-based index.
extra:
  python:
    source: tools/excel_to_image.py
identity:
  author: manjiliao
  label:
    en_US: Excel To Image
    zh_Hans: Excel 转图片
  name: excel_to_image
parameters:
  - name: excel_content
    type: file
    required: true
    form: llm
    label:
      en_US: Excel File
      zh_Hans: Excel 文件
    human_description:
      en_US: Upload an Excel file such as xls, xlsx, xlsm, xlsb, or ods
      zh_Hans: 上传 Excel 文件，例如 xls、xlsx、xlsm、xlsb 或 ods
    llm_description: The Excel file to convert into images.
  - name: sheets
    type: string
    required: false
    default: all
    form: llm
    label:
      en_US: Sheets
      zh_Hans: 工作表
    human_description:
      en_US: all, or a comma-separated list of sheet names, indexes, or ranges such as Sheet1,2,4-6
      zh_Hans: all，或逗号分隔的工作表名、序号、范围，例如 Sheet1,2,4-6
    llm_description: Which worksheets to export. Use all, sheet names, 1-based indexes, or ranges like 1,3-5.
  - name: image_format
    type: select
    required: false
    default: png
    form: form
    label:
      en_US: Image Format
      zh_Hans: 图片格式
    human_description:
      en_US: Output image format
      zh_Hans: 输出图片格式
    llm_description: Output image format, usually png or jpg.
    options:
      - value: png
        label:
          en_US: PNG
          zh_Hans: PNG
      - value: jpg
        label:
          en_US: JPG
          zh_Hans: JPG
  - name: remove_margins
    type: boolean
    required: false
    default: true
    form: form
    label:
      en_US: Remove Margins
      zh_Hans: 去除页边距
    human_description:
      en_US: Remove worksheet page margins before rendering
      zh_Hans: 渲染前移除工作表页边距
    llm_description: Whether to set worksheet page margins to zero before exporting images.
  - name: scale_percent
    type: string
    required: false
    default: "130"
    form: form
    label:
      en_US: Scale Percent
      zh_Hans: 缩放比例
    human_description:
      en_US: Export zoom percentage. Higher values make the output wider and larger.
      zh_Hans: 导出缩放百分比，值越大，输出越宽越大
    llm_description: Zoom percentage used when exporting images, typically between 100 and 150.
  - name: output_dpi
    type: string
    required: false
    default: "150"
    form: form
    label:
      en_US: Output DPI
      zh_Hans: 输出 DPI
    human_description:
      en_US: Image DPI used during export. Higher values increase image resolution.
      zh_Hans: 导出时使用的图片 DPI，值越大分辨率越高
    llm_description: Output image DPI, typically between 96 and 200.
